<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guide de Menton</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #fffde6; }
    .chat-wrapper { width: 100%; max-width: 420px; border: 1px solid #e0c840; border-radius: 16px; overflow: hidden; background: white; }
    .chat-header { background: #f5c800; padding: 14px 18px; display: flex; align-items: center; gap: 10px; }
    .chat-header-icon { width: 36px; height: 36px; border-radius: 50%; background: white; display: flex; align-items: center; justify-content: center; font-size: 20px; }
    .chat-header h2 { font-size: 15px; color: #3a2e00; }
    .chat-header p { font-size: 12px; color: #7a6200; }
    .chat-messages { height: 350px; overflow-y: auto; padding: 14px; display: flex; flex-direction: column; gap: 10px; background: #fffff5; }
    .msg { max-width: 82%; padding: 9px 13px; border-radius: 14px; font-size: 14px; line-height: 1.5; }
    .msg.bot { background: #fffde6; border: 1px solid #e0c840; color: #3a2e00; align-self: flex-start; border-bottom-left-radius: 4px; }
    .msg.user { background: #f5c800; color: #3a2e00; align-self: flex-end; border-bottom-right-radius: 4px; }
    .msg.loading { opacity: 0.6; font-style: italic; }
    .suggestions { display: flex; flex-wrap: wrap; gap: 6px; padding: 8px 14px; background: #fffff5; }
    .suggestion-btn { font-size: 12px; background: white; border: 1px solid #e0c840; border-radius: 12px; padding: 5px 10px; cursor: pointer; color: #7a6200; }
    .suggestion-btn:hover { background: #fffde6; }
    .chat-input-area { display: flex; gap: 8px; padding: 12px; border-top: 1px solid #e0c840; background: white; }
    .chat-input-area input { flex: 1; border: 1px solid #e0c840; border-radius: 20px; padding: 8px 14px; font-size: 14px; outline: none; }
    .send-btn { background: #f5c800; border: none; border-radius: 50%; width: 36px; height: 36px; cursor: pointer; font-size: 16px; }
    .send-btn:hover { background: #e0b800; }
  </style>
</head>
<body>
  <div class="chat-wrapper">
    <div class="chat-header">
      <div class="chat-header-icon">🍋</div>
      <div>
        <h2>Guide de Menton</h2>
        <p>Posez vos questions sur la ville</p>
      </div>
    </div>
    <div class="chat-messages" id="messages">
      <div class="msg bot">Bonjour ! Je suis votre guide virtuel de Menton 🍋 Je peux vous renseigner sur le tourisme, l'histoire, les événements et les transports. Comment puis-je vous aider ?</div>
    </div>
    <div class="suggestions">
      <button class="suggestion-btn" onclick="suggest(this)">Que visiter ?</button>
      <button class="suggestion-btn" onclick="suggest(this)">Fête du Citron ?</button>
      <button class="suggestion-btn" onclick="suggest(this)">Comment y accéder ?</button>
      <button class="suggestion-btn" onclick="suggest(this)">Histoire de Menton</button>
    </div>
    <div class="chat-input-area">
      <input id="userInput" type="text" placeholder="Votre question sur Menton..." onkeydown="if(event.key==='Enter')sendMsg()" />
      <button class="send-btn" onclick="sendMsg()">➤</button>
    </div>
  </div>
  <script>
    let history = [];
    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('userInput');

    function suggest(btn) {
      inputEl.value = btn.textContent;
      sendMsg();
    }

    function addMsg(text, role, isLoading = false) {
      const div = document.createElement('div');
      div.className = 'msg ' + role + (isLoading ? ' loading' : '');
      div.textContent = text;
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return div;
    }

    async function sendMsg() {
      const text = inputEl.value.trim();
      if (!text) return;
      inputEl.value = '';
      addMsg(text, 'user');
      history.push({ role: 'user', content: text });
      const loadingEl = addMsg('En train de répondre...', 'bot', true);
      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages: history })
        });
        const data = await res.json();
        loadingEl.remove();
        addMsg(data.reply, 'bot');
        history.push({ role: 'assistant', content: data.reply });
      } catch (e) {
        loadingEl.textContent = "Une erreur s'est produite. Veuillez réessayer.";
        loadingEl.classList.remove('loading');
      }
    }
  </script>
</body>
</html>
